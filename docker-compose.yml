# Builds and serves every project's Flask prediction app on a distinct port.
# Train each project first (`make train PROJECT=<name>`) so an artifact exists.
services:
  airplane:
    build: ./airplane
    ports: ["8081:8080"]
  creditrisk:
    build: ./creditrisk
    ports: ["8082:8080"]
  hmda:
    build: ./hmda
    ports: ["8083:8080"]
  houseprice:
    build: ./houseprice
    ports: ["8084:8080"]
  utilization:
    build: ./utilization
    ports: ["8085:8080"]
