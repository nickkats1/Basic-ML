name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: lint & test (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [airplane, creditrisk, hmda, houseprice, utilization]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest

  docker-build:
    name: docker build (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        project: [airplane, creditrisk, hmda, houseprice, utilization]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ matrix.project }}:ci ./${{ matrix.project }}
