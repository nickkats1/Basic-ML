[tool.ruff]
line-length = 88
target-version = "py311"
extend-exclude = ["venv", ".venv", "notebooks", "*.ipynb", "mlruns", "mlartifacts"]

[tool.ruff.lint]
# pycodestyle, pyflakes, isort, pyupgrade, bugbear, comprehensions, simplify.
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501"]  # line length handled by the formatter

[tool.ruff.lint.isort]
known-first-party = ["helpers", "src"]
